<!DOCTYPE html>
<html>
<head>
    <title>Enotes AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h2 class="text-center">AI Notes Summarizer</h2>

    <div class="card p-4 mt-4 bg-secondary">
        
         <h3 class="text-left"> Enter the Title </h3>
        <input type="text" id="title" class="form-control mb-3" placeholder="Enter title">

         <h3 class="text-left"> Paste your texted notes </h3>
        <textarea id="text" class="form-control mb-3" rows="5" placeholder="Paste your text"></textarea>

        <h2 class="text-center"> OR </h2>

        <h3 class="text-left"> Upload a PDF File </h3>

        <input type="file" id="file" class="form-control mb-3">
<br>
<br>

<button id="btn" class="btn btn-primary w-30 mx-auto"  onclick="uploadNote()">Summarize</button>
    </div>

<div class="text-center mt-3" id="loading" style="display: none;">
    <div class="spinner-border text-light" role="status"></div>
    <p>Processing... please wait</p>
</div>

    <div class="mt-4">
        <h4>Summary:</h4>
        <p id="result" class="mt-3 fw-bold"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
